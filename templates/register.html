{% extends "base.html" %}

{% block content %}
<form method="POST" autocorrect="off" spellcheck="false" autocapitalize="off">
  <input type="text" name="username" autocomplete="username" placeholder="Username" required><br />
  <input type="password" name="password" autocomplete="new-password" placeholder="Password" required><br />
  <input type="password" name="password_repeated" autocomplete="new-password" placeholder="Repeat password" required><br />
  <button type="submit">Register</button>
</form>
<p>Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
{% endblock %}
